name: Daily Blog Post to Telegram

on:
  schedule:
    # 매일 KST 08:00 = UTC 23:00 (전날)
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send daily post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: pnpm run send-daily-post

      - name: Commit sent log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/sent-posts.json; then
            echo "No changes to commit"
          else
            git add data/sent-posts.json
            git commit -m "chore(daily-post): update sent log"
            git push
          fi
